openapi: 3.1.0
info:
  title: Laravel Clean Architecture API
  version: 0.1.0
paths:
  /api/v1/projects:
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_id, name]
              properties:
                owner_id:
                  type: integer
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Project created
  /api/v1/projects/{project}/tasks:
    post:
      summary: Create task
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Task created
